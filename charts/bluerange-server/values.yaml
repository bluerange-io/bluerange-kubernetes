# Default values for bluerangeServer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: bluerange/bluerange
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

startupProbe:
  failureThreshold: 60
  periodSeconds: 10
  timeoutSeconds: 1
livenessProbe:
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 1
readinessProbe:
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 1


resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

bluerangeServer:
  config:
    mqtt:
      enabled: true
      server_uris: tcp://bluerange-mosquitto:1883
  environment:
    RELUTION_OPTS: -XX:MinRAMPercentage=50.0 -XX:MaxRAMPercentage=40.0
  secrets: {}
  existingSecretRefs: []
  restore:
    postgresql:
      enabled: false

additionalVolumes: []
additionalVolumeMounts: []

terminationGracePeriodSeconds: ~

# The heap dump exporter sidecar is intended to be used for debugging. It will monitor the /opt/relution/log directory (customizable) and copy new files to a S3 bucket so they can be further inspected by our development team.
heapDumpExporter:
  enabled: false
  image:
    repository: amazon/aws-cli
    pullPolicy: IfNotPresent
    tag: "2.31.14"
  directory: /opt/relution/log
  s3:
    endpointUrl: https://s3.eu-central-1.amazonaws.com
    bucket: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""

s2s:
  enabled: false
  image:
    repository: ubuntu
    pullPolicy: IfNotPresent
    tag: "24.04"
  packages:
    # renovate: suite=noble depName=strongswan
    strongswan: "5.9.13-2ubuntu4.24.04.1"
    # renovate: suite=noble depName=iptables
    iptables: "1.8.10-3ubuntu2"
  livenessProbe:
    enabled: false
  logLevel: 1
  psk: ""
  ike:
    proposals: sha512-aes256-ecp384
  ipsec:
    proposals: chacha20poly1305-ecp384
  remote:
    ip: ""
    subnets: []
  local:
    id: bluerange
    nat: ""
    transferSubnet: ""

# MariaDB is provided as a dependency to enable quick debugging. We recommend deploying BlueRange on a dedicated database cluster.
mariadb:
  enabled: false
  auth:
    ## Choose a secure password before deploying BlueRange.
    # rootPassword:
    database: bluerange
    username: bluerange
    ## Choose a secure password before deploying BlueRange.
    # password:

mongodb:
  enabled: false
  auth:
    rootUser: admin
    ## Choose a secure password before deploying BlueRange.
    # rootPassword:
  customUser:
    database: bluerange
    name: bluerange
    ## Choose a secure password before deploying BlueRange.
    # password:
